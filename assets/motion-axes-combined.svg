<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Yaw, pitch, and roll comparison</title>
  <desc id="desc">A single comparison graphic showing pitch, roll, and yaw with arrows and short labels.</desc>
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#d97706"/>
    </marker>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1198" height="298" rx="22" fill="#f8fbff" stroke="#dbeafe" stroke-width="2"/>
  <text x="600" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">One graphic showing the difference between pitch, roll, and yaw</text>

  <g transform="translate(40,58)">
    <rect x="0" y="0" width="350" height="200" rx="18" fill="url(#panelBg)" stroke="#dbeafe"/>
    <rect x="18" y="16" width="66" height="24" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="51" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#2563eb">PITCH</text>
    <line x1="40" y1="152" x2="310" y2="152" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
    <g transform="rotate(-13 176 111)">
      <rect x="110" y="92" width="132" height="38" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
      <rect x="146" y="78" width="60" height="16" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/>
      <circle cx="176" cy="111" r="7" fill="#2563eb"/>
    </g>
    <path d="M72 132 C74 60, 285 58, 286 132" fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
    <text x="176" y="174" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#334155">Forward / backward tilt</text>
    <text x="176" y="192" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">Braking, acceleration, hills</text>
  </g>

  <g transform="translate(425,58)">
    <rect x="0" y="0" width="350" height="200" rx="18" fill="url(#panelBg)" stroke="#fed7aa"/>
    <rect x="18" y="16" width="60" height="24" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="48" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#d97706">ROLL</text>
    <line x1="40" y1="152" x2="310" y2="152" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
    <g transform="rotate(12 176 111)">
      <rect x="110" y="92" width="132" height="38" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
      <rect x="146" y="78" width="60" height="16" rx="8" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
      <circle cx="176" cy="111" r="7" fill="#d97706"/>
    </g>
    <path d="M86 76 C118 28, 236 28, 266 76" fill="none" stroke="#d97706" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowAmber)"/>
    <text x="176" y="174" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#334155">Side to side lean</text>
    <text x="176" y="192" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">Cornering, body roll, curbs</text>
  </g>

  <g transform="translate(810,58)">
    <rect x="0" y="0" width="350" height="200" rx="18" fill="url(#panelBg)" stroke="#cbd5e1"/>
    <rect x="18" y="16" width="54" height="24" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="45" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#64748b">YAW</text>
    <ellipse cx="176" cy="142" rx="92" ry="14" fill="#e2e8f0"/>
    <rect x="126" y="60" width="100" height="74" rx="18" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/>
    <rect x="148" y="44" width="56" height="18" rx="9" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/>
    <circle cx="176" cy="97" r="7" fill="#64748b"/>
    <path d="M88 104 C95 46, 258 44, 264 104" fill="none" stroke="#64748b" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
    <text x="176" y="174" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#334155">Rotate around vertical axis</text>
    <text x="176" y="192" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">Useful, but adds a lot of complexity</text>
  </g>
</svg>
