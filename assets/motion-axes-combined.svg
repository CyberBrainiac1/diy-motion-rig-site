<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Airplane-style yaw, pitch, and roll comparison</title>
  <desc id="desc">A single airplane diagram showing how pitch tilts nose up and down, roll leans side to side, and yaw rotates left and right around a vertical axis.</desc>
  <defs>
    <marker id="pitchArrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#60a5fa"/>
    </marker>
    <marker id="rollArrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#fb923c"/>
    </marker>
    <marker id="yawArrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#cbd5e1"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="1180" height="440" rx="28" fill="#0b1020"/>
  <text x="600" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">One airplane-style graphic showing the difference between pitch, roll, and yaw</text>
  <text x="600" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#94a3b8">Pitch changes nose angle, roll tilts side to side, and yaw changes heading around a vertical axis.</text>

  <g transform="translate(620 252) rotate(-18)" filter="url(#shadow)">
    <polygon points="-40,-18 -150,-150 70,-112 125,-26" fill="#dc2626"/>
    <polygon points="16,18 125,26 70,112 -150,150" fill="#dc2626"/>
    <polygon points="178,-20 242,-78 282,-38 216,-8" fill="#dc2626"/>
    <polygon points="178,20 216,8 282,38 242,78" fill="#dc2626"/>
    <polygon points="188,-34 262,-148 230,-42" fill="#dc2626"/>

    <path d="M-292 0 C-292 -48 -238 -82 -156 -80 L34 -64 L146 -22 L238 -8 L238 8 L146 22 L34 64 L-156 80 C-238 82 -292 48 -292 0 Z" fill="#1d4ed8" stroke="#2563eb" stroke-width="4"/>
    <line x1="-238" y1="0" x2="0" y2="0" stroke="#0f172a" stroke-width="5"/>
    <line x1="0" y1="0" x2="0" y2="92" stroke="#0f172a" stroke-width="5"/>
    <circle cx="0" cy="0" r="18" fill="#fde047" stroke="#0f172a" stroke-width="4"/>
  </g>

  <path d="M172 320 C104 266, 112 182, 182 142" fill="none" stroke="#60a5fa" stroke-width="8" stroke-linecap="round" marker-end="url(#pitchArrow)"/>
  <text x="112" y="168" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#60a5fa">PITCH</text>
  <text x="92" y="198" font-family="Inter, Arial, sans-serif" font-size="17" fill="#dbeafe">Nose up / nose down</text>
  <text x="92" y="222" font-family="Inter, Arial, sans-serif" font-size="15" fill="#94a3b8">Main cue for braking and acceleration</text>

  <path d="M432 372 C532 442, 686 442, 792 372" fill="none" stroke="#fb923c" stroke-width="8" stroke-linecap="round" marker-end="url(#rollArrow)"/>
  <text x="496" y="415" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#fb923c">ROLL</text>
  <text x="496" y="441" font-family="Inter, Arial, sans-serif" font-size="17" fill="#ffedd5">Lean left / lean right</text>

  <path d="M858 146 C940 82, 1046 88, 1098 154" fill="none" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round" marker-end="url(#yawArrow)"/>
  <text x="924" y="112" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#e2e8f0">YAW</text>
  <text x="924" y="138" font-family="Inter, Arial, sans-serif" font-size="17" fill="#e2e8f0">Rotate left / rotate right</text>
  <text x="924" y="162" font-family="Inter, Arial, sans-serif" font-size="15" fill="#94a3b8">Useful, but it adds a lot more complexity</text>

  <text x="600" y="420" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#94a3b8">This view is clearer because all three motions are shown on one vehicle at once instead of three nearly identical mini diagrams.</text>
</svg>
